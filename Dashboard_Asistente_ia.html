<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTQE4g9vlcSyxx12bIp6Bs7QRmkZ4pfABjCYH2EXULJXBQoUiha1Zz9fKYLd2fEMqfDI0UDgvnRmFTL/pub?output=csv';

let allData = [], currentType = 'Quincenal', currentPeriodIdx = 0;
let deviceChart = null, countryChart = null, trendChart = null, eventsChart = null, ratesChart = null;

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
  return lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    vals.push(cur.trim());
    const row = {};
    headers.forEach((h, i) => { row[h] = vals[i] || ''; });
    return row;
  });
}

function fv(v) { return v && v !== '' ? parseFloat(v) : null; }

function getPeriods(type) {
  const seen = new Map();
  allData.filter(r => r.Tipo_periodo === type).forEach(r => {
    if (!seen.has(r.Periodo_Label)) seen.set(r.Periodo_Label, parseFloat(r.Periodo_Orden) || 0);
  });
  return [...seen.entries()].sort((a,b) => a[1]-b[1]).map(e => e[0]);
}

function getMetric(rows, kpi, field) {
  const r = rows.find(x => x.KPI === kpi);
  return r ? fv(r[field]) : null;
}

function getRowsFor(type, period) {
  return allData.filter(r => r.Tipo_periodo === type && r.Periodo_Label === period);
}

function fmtN(v) { return v === null ? '—' : Math.round(v).toLocaleString('es-PE'); }
function fmtPct(v) { return v === null ? '—' : (v * 100).toFixed(1) + '%'; }
function fmtDelta(varN) {
  if (varN === null || varN === undefined) return '<span class="kpi-delta base">período base</span>';
  const pct = Math.round(varN * 100);
  if (varN > 0) return `<span class="kpi-delta up">▲ +${pct}% vs anterior</span>`;
  if (varN < 0) return `<span class="kpi-delta down">▼ ${pct}% vs anterior</span>`;
  return '<span class="kpi-delta neutral">— sin cambio</span>';
}

function renderKPIs(rows) {
  const defs = [
    { label: 'AI Activated Users', kpi: 'AI Activated Users', field: 'Valor_N', fmt: fmtN, varField: 'Variacion_N' },
    { label: 'AI Engaged Users', kpi: 'AI Engaged Users', field: 'Valor_N', fmt: fmtN, varField: 'Variacion_N' },
    { label: 'Activation Rate', kpi: 'AI Activation Rate', field: 'Valor_%', fmt: fmtPct, varField: 'Variacion_%' },
    { label: 'Engagement Rate', kpi: 'AI Engagement Rate', field: 'Valor_%', fmt: fmtPct, varField: 'Variacion_%' },
    { label: 'Chat Messages', kpi: 'Chat Messages', field: 'Valor_N', fmt: fmtN, varField: 'Variacion_N' },
    { label: 'Itinerarios creados', kpi: 'Itineraries Created', field: 'Valor_N', fmt: fmtN, varField: 'Variacion_N' },
    { label: 'AI Exposed (views)', kpi: 'AI Exposed (views)', field: 'Valor_N', fmt: fmtN, varField: 'Variacion_N' },
    { label: 'User Registrations', kpi: 'User Registrations', field: 'Valor_N', fmt: fmtN, varField: 'Variacion_N' },
  ];
  document.getElementById('kpi-grid').innerHTML = defs.map(d => {
    const r = rows.find(x => x.KPI === d.kpi);
    const val = r ? fv(r[d.field]) : null;
    const varN = r ? fv(r[d.varField]) : null;
    return `<div class="kpi-card"><p class="kpi-label">${d.label}</p><p class="kpi-value">${val !== null ? d.fmt(val) : '—'}</p>${fmtDelta(varN)}</div>`;
  }).join('');
}

function renderFunnel(rows, period) {
  document.getElementById('funnel-subtitle').textContent = period;
  const steps = [
    { label: '1 mensaje', kpi: 'Sent 1 Chat Message' },
    { label: '2 mensajes', kpi: 'Sent 2 Chat Message' },
    { label: '3 mensajes', kpi: 'Sent 3 Chat Messages' },
    { label: '4 mensajes', kpi: 'Sent 4 Chat Message' },
    { label: '5 mensajes', kpi: 'Sent 5 Chat Messages' },
  ];
  const colors = ['#D91023','#C53030','#a82828','#8B0A17','#6b0812'];
  document.getElementById('funnel-container').innerHTML = steps.map((s, i) => {
    const r = rows.find(x => x.KPI === s.kpi);
    const n = r ? fv(r['Valor_N']) : null;
    const pct = r ? fv(r['Valor_%']) : null;
    const w = pct !== null ? Math.round(pct * 100) : 0;
    return `<div class="funnel-row"><span class="funnel-label">${s.label}</span><div class="funnel-track"><div class="funnel-fill" style="width:${w}%;background:${colors[i]}"></div></div><span class="funnel-num">${n !== null ? Math.round(n).toLocaleString('es-PE') : '—'} <span style="color:var(--text-muted);font-size:10px">(${w}%)</span></span></div>`;
  }).join('');
}

function renderDeviceChart(rows, period) {
  document.getElementById('device-subtitle').textContent = period;
  const deviceRows = rows.filter(r => r['Categoría tipo de Usuario'] === 'Device' || r['Categoria tipo de Usuario'] === 'Device');
  const labels = deviceRows.map(r => r.KPI);
  const vals = deviceRows.map(r => { const v = fv(r['Valor_%']); return v !== null ? Math.round(v * 100) : 0; });
  const colors = ['#D91023','#8B0A17','#C53030'];
  document.getElementById('device-legend').innerHTML = labels.map((l,i) => `<span><span class="legend-dot" style="background:${colors[i]}"></span>${l} ${vals[i]}%</span>`).join('');
  if (deviceChart) deviceChart.destroy();
  deviceChart = new Chart(document.getElementById('chart-device').getContext('2d'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: vals, backgroundColor: colors, borderWidth: 0, hoverOffset: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: '60%', plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ' ' + c.label + ': ' + c.parsed + '%' } } } }
  });
}

function renderCountryChart(rows, period) {
  document.getElementById('country-subtitle').textContent = period;
  const countryRows = rows.filter(r => r['Categoría tipo de Usuario'] === 'Country' || r['Categoria tipo de Usuario'] === 'Country');
  const labels = countryRows.map(r => r.KPI);
  const vals = countryRows.map(r => fv(r['Valor_N']) || 0);
  document.getElementById('country-wrap').style.height = Math.max(220, labels.length * 30 + 60) + 'px';
  const colors = labels.map((_, i) => `rgba(217,16,35,${1 - (i / (labels.length + 2)) * 0.5})`);
  if (countryChart) countryChart.destroy();
  countryChart = new Chart(document.getElementById('chart-country').getContext('2d'), {
    type: 'bar',
    data: { labels, datasets: [{ data: vals, backgroundColor: colors, borderRadius: 3 }] },
    options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ' ' + Math.round(c.parsed.x).toLocaleString('es-PE') + ' usuarios' } } }, scales: { x: { ticks: { font: { size: 10 }, callback: v => v.toLocaleString('es-PE') } }, y: { ticks: { font: { size: 11 }, autoSkip: false } } } }
  });
}

function buildTrendChart(periods, type) {
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('chart-trend').getContext('2d'), {
    type: 'line',
    data: {
      labels: periods,
      datasets: [
        { label: 'AI Activated Users', data: periods.map(p => getMetric(getRowsFor(type,p), 'AI Activated Users', 'Valor_N')), borderColor: '#D91023', backgroundColor: '#D9102315', borderWidth: 2, pointRadius: 4, pointBackgroundColor: '#D91023', fill: true, tension: 0.3 },
        { label: 'AI Engaged Users', data: periods.map(p => getMetric(getRowsFor(type,p), 'AI Engaged Users', 'Valor_N')), borderColor: '#8B0A17', backgroundColor: '#8B0A1710', borderWidth: 2, pointRadius: 4, pointBackgroundColor: '#8B0A17', fill: true, tension: 0.3, borderDash: [5,3] }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { autoSkip: false, maxRotation: 30, font: { size: 10 } } }, y: { ticks: { font: { size: 10 }, callback: v => v.toLocaleString('es-PE') } } } }
  });
}

function buildEventsChart(periods, type) {
  if (eventsChart) eventsChart.destroy();
  eventsChart = new Chart(document.getElementById('chart-events').getContext('2d'), {
    type: 'bar',
    data: {
      labels: periods,
      datasets: [
        { label: 'AI Activations', data: periods.map(p => getMetric(getRowsFor(type,p), 'AI Activations', 'Valor_N')), backgroundColor: 'rgba(217,16,35,0.8)', borderRadius: 4 },
        { label: 'Chat Messages', data: periods.map(p => getMetric(getRowsFor(type,p), 'Chat Messages', 'Valor_N')), backgroundColor: 'rgba(139,10,23,0.75)', borderRadius: 4 }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { autoSkip: false, maxRotation: 30, font: { size: 10 } } }, y: { ticks: { font: { size: 10 }, callback: v => v.toLocaleString('es-PE') } } } }
  });
}

function buildRatesChart(periods, type) {
  document.getElementById('rates-legend').innerHTML = `<span><span class="legend-dot" style="background:#D91023"></span>Activation Rate</span><span><span class="legend-dot" style="background:#8B0A17"></span>Engagement Rate</span>`;
  if (ratesChart) ratesChart.destroy();
  ratesChart = new Chart(document.getElementById('chart-rates').getContext('2d'), {
    type: 'line',
    data: {
      labels: periods,
      datasets: [
        { label: 'Activation Rate', data: periods.map(p => { const v = getMetric(getRowsFor(type,p), 'AI Activation Rate', 'Valor_%'); return v !== null ? parseFloat((v*100).toFixed(2)) : null; }), borderColor: '#D91023', backgroundColor: 'rgba(217,16,35,0.08)', borderWidth: 2, pointRadius: 4, pointBackgroundColor: '#D91023', fill: true, tension: 0.3, yAxisID: 'y1' },
        { label: 'Engagement Rate', data: periods.map(p => { const v = getMetric(getRowsFor(type,p), 'AI Engagement Rate', 'Valor_%'); return v !== null ? parseFloat((v*100).toFixed(2)) : null; }), borderColor: '#8B0A17', backgroundColor: 'rgba(139,10,23,0.06)', borderWidth: 2, pointRadius: 4, pointBackgroundColor: '#8B0A17', fill: true, tension: 0.3, borderDash: [5,3], yAxisID: 'y2' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { autoSkip: false, maxRotation: 30, font: { size: 10 } } },
        y1: { type: 'linear', position: 'left', ticks: { font: { size: 10 }, callback: v => v + '%' }, title: { display: true, text: 'Activación', font: { size: 10 } } },
        y2: { type: 'linear', position: 'right', ticks: { font: { size: 10 }, callback: v => v + '%' }, grid: { drawOnChartArea: false }, title: { display: true, text: 'Engagement', font: { size: 10 } } }
      }
    }
  });
}

function renderPeriodBtns(type) {
  const periods = getPeriods(type);
  document.getElementById('period-btns').innerHTML = periods.map((p, i) =>
    `<button class="ctrl-btn${i === currentPeriodIdx ? ' active' : ''}" onclick="setPeriod(${i})">${p}</button>`
  ).join('');
}

function setPeriod(idx) {
  currentPeriodIdx = idx;
  const periods = getPeriods(currentType);
  document.querySelectorAll('#period-btns .ctrl-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  const period = periods[idx];
  const rows = getRowsFor(currentType, period);
  renderKPIs(rows);
  renderFunnel(rows, period);
  renderDeviceChart(rows, period);
  renderCountryChart(rows, period);
  document.getElementById('footer-period').textContent = currentType + ' · ' + period;
}

function setType(type) {
  currentType = type;
  currentPeriodIdx = 0;
  document.querySelectorAll('#type-btns .ctrl-btn').forEach(b => b.classList.toggle('active', b.textContent === type));
  const periods = getPeriods(type);
  renderPeriodBtns(type);
  buildTrendChart(periods, type);
  buildEventsChart(periods, type);
  buildRatesChart(periods, type);
  setPeriod(0);
}

window.setPeriod = setPeriod;
window.setType = setType;

async function init() {
  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    allData = parseCSV(text).filter(r => r.Tipo_periodo && r.Tipo_periodo !== '... (truncated at 1000 rows)');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('last-updated').textContent = 'Actualizado: ' + new Date().toLocaleDateString('es', { day:'2-digit', month:'short', year:'numeric' });
    setType('Quincenal');
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'block';
    errEl.textContent = 'No se pudieron cargar los datos. Verifica que el Google Sheet esté publicado correctamente. Detalle: ' + err.message;
  }
}

init();
</script>
